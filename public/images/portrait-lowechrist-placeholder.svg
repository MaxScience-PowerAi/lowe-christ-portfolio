<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000" role="img" aria-label="Placeholder portrait - Lowe Christ (Cameroun)">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0b0b0f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#ef4444" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0.9"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#dots)"/>

  <g transform="translate(400 420)">
    <circle r="210" fill="none" stroke="url(#ring)" stroke-width="10" opacity="0.9"/>
    <circle r="190" fill="#000000" fill-opacity="0.25"/>
    <path d="M-90 120c30 40 70 60 90 60s60-20 90-60" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="10" stroke-linecap="round"/>
    <circle cx="-70" cy="-20" r="18" fill="#ffffff" fill-opacity="0.28"/>
    <circle cx="70" cy="-20" r="18" fill="#ffffff" fill-opacity="0.28"/>
    <path d="M-70 -60c10-30 40-50 70-50s60 20 70 50" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g fill="#ffffff" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
    <text x="60" y="820" font-size="34" font-weight="300" fill-opacity="0.92">PORTRAIT PLACEHOLDER</text>
    <text x="60" y="870" font-size="20" font-weight="300" fill-opacity="0.7">Ą remplacer par ta photo (Lowe Christ)</text>
    <text x="60" y="905" font-size="16" font-weight="300" fill-opacity="0.55">/public/images/portrait-lowechrist-placeholder.svg</text>
  </g>
